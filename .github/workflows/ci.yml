name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint (ruff) if configured
        run: |
          if python -c "import ruff" 2>/dev/null; then ruff check .; else echo "ruff not installed"; fi

      - name: Tests (pytest) if configured
        run: |
          if python -c "import pytest" 2>/dev/null; then pytest -q; else echo "pytest not installed"; fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: |
          if npm run | grep -q "lint"; then npm run lint; else echo "no lint script"; fi

      - name: Test
        run: |
          if npm run | grep -q "test"; then npm run test; else echo "no test script"; fi

      - name: Build
        run: |
          if npm run | grep -q "build"; then npm run build; else echo "no build script"; fi
