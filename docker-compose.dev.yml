services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseguest}
      POSTGRES_USER: ${POSTGRES_USER:-pulseguest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseguest}
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env.dev
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - static_dev:/app/static
      - media_dev:/app/media
    ports:
      - "8000:8000"
    command: ["/app/docker/start.sh"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env.dev
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  pg_data_dev:
  static_dev:
  media_dev:
